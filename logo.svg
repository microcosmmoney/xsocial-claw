<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#e04040"/>
      <stop offset="100%" stop-color="#b82020"/>
    </radialGradient>
    <radialGradient id="clawGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d83535"/>
      <stop offset="100%" stop-color="#a01a1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="280" fill="#000000" rx="16"/>

  <!-- Antennae -->
  <path d="M185 68 Q180 45 175 35" stroke="#c83030" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M215 68 Q220 45 225 35" stroke="#c83030" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Body (slightly vertical oval) -->
  <ellipse cx="200" cy="118" rx="56" ry="58" fill="url(#bodyGrad)"/>

  <!-- Left Claw (angled upward) -->
  <ellipse cx="137" cy="128" rx="16" ry="14" transform="rotate(25 137 128)" fill="url(#clawGrad)"/>

  <!-- Right Claw (mirrored, angled upward) -->
  <ellipse cx="263" cy="128" rx="16" ry="14" transform="rotate(-25 263 128)" fill="url(#clawGrad)"/>

  <!-- Left Eye -->
  <circle cx="182" cy="108" r="7" fill="#0a0a0a"/>
  <circle cx="183" cy="107" r="4" fill="#00e5cc"/>
  <circle cx="184" cy="106" r="1.5" fill="#ffffff"/>

  <!-- Right Eye -->
  <circle cx="218" cy="108" r="7" fill="#0a0a0a"/>
  <circle cx="219" cy="107" r="4" fill="#00e5cc"/>
  <circle cx="220" cy="106" r="1.5" fill="#ffffff"/>

  <!-- Legs -->
  <rect x="185" y="170" width="8" height="14" rx="2" fill="#b82020"/>
  <rect x="207" y="170" width="8" height="14" rx="2" fill="#b82020"/>

  <!-- xSocial Claw text -->
  <text x="200" y="218" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" letter-spacing="3" font-weight="400">POWERED BY OPENCLAW</text>

  <!-- Brand name -->
  <text x="200" y="248" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="28" letter-spacing="1">
    <tspan fill="#ff5722">x</tspan><tspan fill="#ffffff">Social</tspan>
    <tspan fill="#666" font-weight="400" font-size="20"> Claw</tspan>
  </text>
</svg>
