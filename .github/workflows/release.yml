name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build

      - name: Create zip archives
        run: |
          cd dist
          zip -r ../xsocial-claw-${{ github.ref_name }}.zip .
          zip -r ../xsocial-claw-latest.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xsocial-claw-${{ github.ref_name }}.zip
            xsocial-claw-latest.zip
          generate_release_notes: true
          name: xSocial Claw ${{ github.ref_name }}
